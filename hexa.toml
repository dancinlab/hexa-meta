# hexa.toml — hexa-meta standalone package manifest
# Spec: shared/hexa-lang/hexa-toml-spec.json (version 1.0.0)
#
# Provenance: MOVED out of dancinlab/canon at canon@a86ca143 on 2026-05-10.
# hexa-meta is the home for n=6 *self-referential* material — the meta-theory,
# self-organizing architecture papers, proof-certification chains, and the
# domain-agnostic discovery / DSE / verification tooling that used to live
# under canon's theory/proofs/, papers/ and bridge/origins/.
#
# Pattern: MOVE (canon no longer holds these; recover via canon git log).

[package]
name = "hexa-meta"
version = "0.1.0"
entry = "cli/hexa-meta.hexa"
description = "n=6 meta-theory + self-organizing architecture + proof-certification + domain-agnostic discovery/DSE/verify tooling (50-doc bundle moved out of canon)."
license = "MIT"
authors = ["박민우 <nerve011235@gmail.com>"]
repository = "https://github.com/dancinlab/hexa-meta"
homepage = "https://github.com/dancinlab/hexa-meta"
readme = "README.md"
keywords = ["n6", "meta-theory", "self-organization", "proof-certification", "discovery-engine", "dse", "hexa-family"]
categories = ["meta", "research-corpus", "spec-substrate"]

# ── Layout ─────────────────────────────────────────────────────
# proofs/  — 11 meta-theory proof docs (attractor-meta, ouroboros-alpha, the-number-24, ...)
# papers/  — 24 self-architecture + cross-cutting papers (n6-arch-*, n6-mk3-synthesis, n6-cross-*, ...)
# tools/   — 15 domain-agnostic calc/DSE/verify tools (discovery-engine, deep-miner, universal-dse, ...)

[closure]
# hexa-meta has no "verbs" in the verb-pattern sense — it is a meta layer
# (proofs + papers + tools + predictions). Closure is measured across four
# distinct tiers below. See verify/run_all.hexa for tier-1 execution.
verbs_total          = 0
verbs_wired          = 0
verdict              = "META_CLOSURE_4TIER"
extracted_from       = "canon/{theory/proofs,papers,bridge/origins,theory/{breakthroughs,constants,flow,predictions,preprints,roadmap-v2,roadmap-v3,study}} + formal/lean4 @ {a86ca143,50e6f679} (MOVE)"

# Tier 1 — executable verify_*.hexa under predictions/ (orchestrator: verify/run_all.hexa).
# All 105 scripts run rc=0; sweep PASS verified 2026-05-13.
tier1_verify_scripts   = 105
tier1_executed_rc0     = 105
tier1_stub_marked      = 2     # verify_bt414_430, verify_killerapp_tp (port-pending stubs)
tier1_orchestrator     = "verify/run_all.hexa"
tier1_status           = "PASS"

# Tier 2 — Lean 4 formal stubs under formal/lean4/N6/{InvariantLattice,Weave}.
# 7 .lean files; 5 contain intentional `sorry` per stub-layer policy (raw_91 C3).
# External tier: built by `lake build`, not by this orchestrator.
tier2_lean_files       = 7
tier2_sorry_files      = 5     # intentional stub-layer skeleton
tier2_status           = "STUB_LAYER (sorry-marked, honest)"

# Tier 3 — document layers: proofs/ (11) + papers/ (24) + breakthroughs/ (6) +
# roadmap-v2/ (65) + roadmap-v3/ (3) + study/ (48). These are meta-theorems
# and architecture papers with citations; not measurement-reducible.
tier3_proof_docs       = 11
tier3_paper_docs       = 24
tier3_breakthrough_idx = 6
tier3_status           = "DOCUMENT_TIER (theorems + citations, not measurements)"

# Tier 4 — domain-agnostic tools under tools/ (15 dirs). Smoke-run rc=0 for
# main entries (some hit hexa-runtime mem-cap at 768 MB — environmental, not
# logical failure; opt-in HEXA_MEM_UNLIMITED=1 for full DSE sweeps).
tier4_tool_dirs        = 15
tier4_status           = "SMOKE_OK (env-bounded; raise mem-cap for full runs)"

# Honest declaration (LATTICE_POLICY.md §1.2):
# This repo's "closure" is structural + executional, NOT empirical. Per
# LIMIT_BREAKTHROUGH.md §3.6, Gödel HARD_WALL forbids internal consistency
# proof; relative consistency is the right honest ceiling.
honest_caveat = "hexa-meta closure is multi-tier structural; no single N/N PASS reduces it. Tier 1 sweep (105/105 rc=0) is the executional anchor; tiers 2-4 are honestly declared as stub-layer / document-tier / smoke-only."

[scope]
honest_scope = "24 papers + 11 proofs + 15 tool dirs MOVED out of canon. This is a research corpus + tooling bundle, not (yet) an n=6 HEXA-template authored standalone. v0.1.0 ships as BUNDLE_FIRST."
not_scope = ["domain-specific specs (live in their hexa-* standalones)", "in-vivo / external validation", "regulatory clearance"]
